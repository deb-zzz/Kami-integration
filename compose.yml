            - BUCKET_NAME=kami-dev-staging
            - CDN_URL=https://d2xjosm5zwjhx3.cloudfront.net
        networks:
            - kami-backend-network
            - kami-frontend-network
        labels:
            com.centurylinklabs.watchtower.enable: "true"

