    dbpusher:
        image: ghcr.io/${GHCR_OWNER:-your-org}/kami-platform-v1-schema:${GHCR_SCHEMA_TAG:-latest}
        environment:
            - DATABASE_URL=postgres://kami:local-dev-password@pgbouncer:6432/kami-v1
            - TZ=Asia/Kuala_Lumpur
        depends_on:
            - db
        networks:
            - kami-backend-network
        labels:
            com.centurylinklabs.watchtower.enable: "true"

    db:
        image: postgres:16
        command: postgres -c 'max_connections=250'
        restart: unless-stopped
        expose:
            - 5432
        environment:
            - POSTGRES_USER=kami
            - POSTGRES_PASSWORD=local-dev-password
            - POSTGRES_DB=kami-v1
            - TZ=Asia/Kuala_Lumpur
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kami -d kami-v1"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - kami-backend-network

    pgbouncer:
        image: edoburu/pgbouncer:latest
        container_name: pgbouncer
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        expose:
            - 6432
        ports:
            - "6001:6432"
        environment:
            - DB_HOST=db
            - DB_PORT=5432
            - DB_NAME=kami-v1
            - DB_USER=kami
            - DB_PASSWORD=local-dev-password
            - LISTEN_PORT=6432
            - POOL_MODE=transaction
            - MAX_CLIENT_CONN=500
            - DEFAULT_POOL_SIZE=20
            - ADMIN_USERS=kami
        volumes:
            - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
            - ./userlist.txt:/etc/pgbouncer/userlist.txt
        networks:
            - kami-backend-network

    redis:
        image: redis:latest
        restart: unless-stopped
        expose:
            - 6379
        ports:
            - "127.0.0.1:6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - kami-backend-network


    # upload-server:
    #   image: your-upload-server-image
    #   volumes:
    #     - upload_data:/data/uploads

    nginx-proxy-manager:
        image: "jc21/nginx-proxy-manager:latest"
        restart: unless-stopped
        ports:
            # These ports are in format <host-port>:<container-port>
            # - '80:80' # Public HTTP Port
            # - '443:443' # Public HTTPS Port
            - "80:80" # Entry Port
            - "443:443" # Entry Port
            - "6080:81" # Admin Web Port
        # Add any other Stream port you want to expose
        # - '21:21' # FTP
        environment:
            - DB_MYSQL_HOST=nginx-db
            - DB_MYSQL_PORT=3306
            - DB_MYSQL_USER=nginx
            - DB_MYSQL_PASSWORD=local-mysql-password
            - DB_MYSQL_NAME=nginx
            - TZ=Asia/Kuala_Lumpur
            - DISABLE_IPV6=true
        volumes:
            - nginx-data:/data
            - letsencrypt:/etc/letsencrypt
            - ../kami-nginx/custom:/etc/nginx/custom:ro
        depends_on:
            - nginx-db
        networks:
            - kami-util-network
            - kami-backend-network
            - kami-frontend-network

    nginx-db:
        image: "jc21/mariadb-aria:latest"
        restart: unless-stopped
        environment:
            - MYSQL_ROOT_PASSWORD=local-mysql-root-password
            - MYSQL_DATABASE=nginx
            - MYSQL_USER=nginx
            - MYSQL_PASSWORD=local-mysql-password
            - MARIADB_AUTO_UPGRADE=1
            - TZ=Asia/Kuala_Lumpur
        volumes:
            - nginx-db:/var/lib/mysql
        networks:
            - kami-backend-network

    kami-watchtower:
        image: containrrr/watchtower:latest
        restart: always
        container_name: Kami-WatchTower
        command: --label-enable --schedule "0 */10 * * * *" #every 10 minutes
        networks:
            - kami-util-network
            - kami-backend-network
            - kami-frontend-network
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - /home/ocunapse/registryAuth.json:/config.json
        environment:
            - TZ=Asia/Kuala_Lumpur

volumes:
    postgres_data:
    upload_data:
    redis_data:
    letsencrypt:
    nginx-data:
    nginx-db:

networks:
    kami-backend-network:
        ipam:
            config:
                - subnet: 10.8.2.0/24
                  gateway: 10.8.2.1

    kami-frontend-network:
        ipam:
            config:
                - subnet: 10.9.2.0/24
                  gateway: 10.9.2.1

    kami-util-network:
        ipam:
            config:
                - subnet: 10.10.2.0/24
                  gateway: 10.10.2.1
