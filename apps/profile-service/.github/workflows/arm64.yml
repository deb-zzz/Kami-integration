name: Profile Service CI workflow ARM64

on:
  pull_request:
      branches: [production]
jobs:
    deploy:
        runs-on: [self-hosted,arm64]
        env:
            TMPDIR: ${{ github.workspace }}/.tmp
        steps:
            - name: Checkout
              uses: actions/checkout@v2
              with:
                  token: ${{ secrets.CI_TOKEN }}
                  submodules: true
            - name: Create temp directory
              run: mkdir -p "${{ github.workspace }}/.tmp"
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                driver: docker
            - name: Login to Docker Hub
              uses: docker/login-action@v1
              with:
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}
            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  builder: ${{ steps.buildx.outputs.name }}
                  push: true
                  tags: '${{ secrets.REGISTRY_USERNAME }}/${{ github.event.repository.name }}:latest , ${{ secrets.REGISTRY_USERNAME }}/${{ github.event.repository.name }}:${{ vars.VERSION }}.${{ github.run_number }}'
                  cache-from: 'type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/${{ github.event.repository.name }}:latest'
                  cache-to: type=inline
