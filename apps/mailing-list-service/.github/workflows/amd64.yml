name: Mailing List Service CI workflow AMD64

on:
    push:
        branches: [main]
jobs:
    deploy:
        runs-on: [self-hosted, amd64]
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.CI_TOKEN }}
                  submodules: recursive
                  fetch-depth: 0
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  builder: ${{ steps.buildx.outputs.name }}
                  push: true
                  tags: '${{ secrets.REGISTRY_USERNAME }}/${{ github.event.repository.name }}:staging , ${{ secrets.REGISTRY_USERNAME }}/${{ github.event.repository.name }}:staging-${{ vars.VERSION }}.${{ github.run_number }}'
                  cache-from: 'type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/${{ github.event.repository.name }}:staging-buildcache'
                  cache-to: 'type=registry,ref=${{ secrets.REGISTRY_USERNAME }}/${{ github.event.repository.name }}:staging-buildcache,mode=max'
                  platforms: linux/amd64
                  build-args: |
                      NODE_OPTIONS=--max-old-space-size=8192 --max-semi-space-size=512
